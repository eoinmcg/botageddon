<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, 
          viewport-fit=cover, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./favicon.gif" type="image/gif" >

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <link rel="apple-touch-icon" href="./apple-icon-180.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-icon-180.png">
    <style>
    @font-face {
      font-family: 'wheaton';
      src: url('./wheaton_capitals.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    body { font-family: 'wheaton', monospace; transition: all 0.5s ease-in-out; background: #222; }
    body.complete { opacity: 0; }
    </style>

  </head>
  <body>
    <script src="./src/lib/littlejs.js"></script>
    <script type="module" src="/src/main.js"></script>

    <div class="loading" style="margin: 40vh auto; width: 50vw; max-width: 300px;">
      <h1 style="text-align: center; font-family: 'wheaton', monospace; font-size: 32px; text-shadow:black 2px 2px 0; color: lime;">Loading...</h1>
      <div class="progress" style="display: block; width: 0%; height: 10px; transition: width .5s ease-in; border-radius: 3px; box-shadow:black 2px 2px 0; background: hotpink;"></div>
    </div>

  </body>
</html>
